server {
    listen 8080;
    server_name vin.moe;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options           "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"   always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    brotli_static on;

    open_file_cache          max=500 inactive=60s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    location ~* \.(?:webp|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control            "public, immutable"                     always;
        add_header X-Frame-Options          "SAMEORIGIN"                            always;
        add_header X-Content-Type-Options   "nosniff"                               always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"       always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"  always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        access_log off;
    }

    location ~* "\.[a-f0-9]{8}\.(css|js)$" {
        expires 1y;
        add_header Cache-Control            "public, immutable"                     always;
        add_header X-Frame-Options          "SAMEORIGIN"                            always;
        add_header X-Content-Type-Options   "nosniff"                               always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"       always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"  always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        access_log off;
    }

    location ~* \.(?:css|js)$ {
        add_header Cache-Control            "no-cache, public"                      always;
        add_header X-Frame-Options          "SAMEORIGIN"                            always;
        add_header X-Content-Type-Options   "nosniff"                               always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"       always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"  always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        access_log off;
    }

    location ~ ^(.+)\.html$ {
        return 301 $scheme://$host$1;
    }

    location = / {
        if ($http_x_forwarded_proto = "http") {
            return 301 https://$host$request_uri;
        }
        try_files /index.html =404;
    }

    location / {
        if ($http_x_forwarded_proto = "http") {
            return 301 https://$host$request_uri;
        }
        try_files $uri $uri.html $uri/ =404;
    }
}
