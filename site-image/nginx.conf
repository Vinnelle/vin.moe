server {
    listen 8080;
    server_name vin.moe;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options           "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"   always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 =302 /;
}
